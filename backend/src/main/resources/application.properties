# ===============================
# SyndiCare Backend Configuration
# ===============================
spring.application.name=syndicare-backend
server.port=8080
server.servlet.context-path=/api

# === Active profile (dev uses H2, prod uses MySQL) ===
spring.profiles.active=dev

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# === File upload limits ===
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === File storage ===
syndicare.storage.location=./uploads

# === JWT ===
syndicare.jwt.secret=ChangeMeInProduction_SyndiCareSecretKeyForJwtSigning_MustBeAtLeast256Bits_ABCDEFGHIJKLMNOP
syndicare.jwt.expiration-ms=86400000

# === CORS ===
syndicare.cors.allowed-origins=http://localhost:5173,http://localhost:3000
